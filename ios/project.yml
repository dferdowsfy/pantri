name: Pantri
options:
  bundleIdPrefix: com.pantri
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES

targets:
  Pantri:
    type: application
    platform: iOS
    sources:
      - path: Pantri
        excludes:
          - "**/*.json"
          - "../PantriTests/**"
    resources:
      - path: Pantri/Resources/consumption_defaults.json
      - path: Pantri/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: com.pantri.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: Pantri/Pantri.entitlements

  PantriTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PantriTests
    dependencies:
      - target: Pantri
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pantri.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pantri.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Pantri"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Pantri:
    build:
      targets:
        Pantri: all
        PantriTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PantriTests
